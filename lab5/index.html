<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pixel Hunt - Lab 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <label>Difficulty:</label>
        <select id="difficulty">
            <option value="10">Lazy (10s)</option>
            <option value="4">Normal (4s)</option>
            <option value="1">Catch me if you can (1s)</option>
        </select>

        <label>Color:</label>
        <select id="colorSelect">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="orange">Orange</option>
        </select>

        <button id="startBtn">Start Game</button>
        
        <div class="stats">
            <span>Score: <b id="scoreBoard">0</b></span>
            <span style="margin-left: 20px;">Time left: <b id="timeLeft">0</b>s</span>
        </div>
    </div>

    <div id="gameArea"></div>

    <script src="script.js"></script>
</body>
</html>
