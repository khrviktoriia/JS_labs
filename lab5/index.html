<div class="controls">
    <label>Choose difficulty:</label>
    <select id="difficulty">
        <option value="10">Lazy (10s)</option>
        <option value="4">Normal (4s)</option>
        <option value="1">Catch me if you can (1s)</option>
    </select>

    <label>Choose color:</label>
    <select id="colorSelect">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
    </select>

    <button id="startBtn">Start</button>
</div>

<div id="gameArea" style="position: relative; width: 500px; height: 400px; border: 1px solid #ccc; margin-top: 20px;">
    </div>
